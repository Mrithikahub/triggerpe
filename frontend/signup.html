<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GigShield AI – Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Same base styles as login.html – copy from login.html's style block */
        /* For brevity, I'll include only the differences; but in real file, copy the entire style block from login.html */
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { min-height:100vh; background: linear-gradient(145deg, #0b2a4f 0%, #1b4a7a 50%, #2c6b9e 100%); display:flex; align-items:center; justify-content:center; position:relative; overflow-x:hidden; }
        .cloud { position:absolute; background:rgba(255,255,255,0.15); border-radius:1000px; box-shadow:0 0 40px rgba(255,255,255,0.2); animation:floatCloud 25s infinite linear; z-index:1; }
        .cloud::after, .cloud::before { content:''; position:absolute; background:inherit; border-radius:50%; }
        .cloud::after { width:80px; height:80px; top:-40px; left:20px; }
        .cloud::before { width:100px; height:100px; top:-50px; left:60px; }
        .cloud1 { width:200px; height:70px; top:10%; left:-10%; animation-duration:35s; }
        .cloud2 { width:300px; height:100px; top:20%; right:-10%; animation-duration:40s; animation-direction:reverse; }
        .cloud3 { width:250px; height:80px; bottom:15%; left:5%; animation-duration:30s; }
        @keyframes floatCloud { 0% { transform:translateX(0); } 100% { transform:translateX(120vw); } }
        .raindrop { position:absolute; width:2px; height:15px; background:rgba(255,255,255,0.3); border-radius:1px; animation:fall 3s infinite ease-in; z-index:2; }
        @keyframes fall { 0% { transform:translateY(-20vh); opacity:0; } 20% { opacity:1; } 80% { opacity:1; } 100% { transform:translateY(120vh); opacity:0; } }
        .sun-ray { position:absolute; width:200px; height:200px; background:radial-gradient(circle, rgba(255,220,100,0.2) 0%, transparent 70%); border-radius:50%; top:5%; right:5%; animation:pulseSun 6s infinite alternate; z-index:1; }
        @keyframes pulseSun { from { transform:scale(0.8); opacity:0.4; } to { transform:scale(1.2); opacity:0.7; } }
        .auth-card { width:90%; max-width:450px; background:rgba(255,255,255,0.1); backdrop-filter:blur(12px); border-radius:2rem; padding:2.5rem 2rem; box-shadow:0 25px 50px -12px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.2); z-index:10; animation:cardAppear 0.8s ease-out; }
        @keyframes cardAppear { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        .logo { text-align:center; margin-bottom:2rem; }
        .logo h1 { font-size:2.5rem; font-weight:700; color:white; text-shadow:0 2px 10px rgba(0,0,0,0.3); animation:titleGlow 2s infinite alternate; }
        @keyframes titleGlow { from { text-shadow:0 2px 10px rgba(0,0,0,0.3); } to { text-shadow:0 2px 20px rgba(255,255,255,0.5); } }
        .logo p { color:rgba(255,255,255,0.8); font-size:1rem; }
        .input-group { margin-bottom:1.5rem; position:relative; }
        .input-group label { display:block; color:rgba(255,255,255,0.9); font-size:0.9rem; font-weight:500; margin-bottom:0.5rem; margin-left:0.5rem; }
        .input-group i { position:absolute; left:1rem; bottom:1rem; color:rgba(255,255,255,0.6); font-size:1.2rem; transition:all 0.3s; }
        .input-group input, .input-group select { width:100%; padding:1rem 1rem 1rem 3rem; background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.2); border-radius:1.5rem; color:white; font-size:1rem; outline:none; transition:all 0.3s ease; }
        .input-group select { appearance:none; cursor:pointer; }
        .input-group select option { background:#1b4a7a; color:white; }
        .input-group input:focus, .input-group select:focus { border-color:#60a5fa; background:rgba(255,255,255,0.25); transform:scale(1.02); box-shadow:0 0 15px rgba(96,165,250,0.5); }
        .input-group input:focus + i, .input-group select:focus + i { color:#60a5fa; }
        .input-group input::placeholder { color:rgba(255,255,255,0.5); }
        .auth-btn { width:100%; padding:1rem; background:linear-gradient(135deg, #3b82f6, #2563eb); border:none; border-radius:1.5rem; color:white; font-size:1.2rem; font-weight:600; cursor:pointer; transition:all 0.3s ease; box-shadow:0 8px 20px rgba(37,99,235,0.3); margin-top:0.5rem; }
        .auth-btn:hover { transform:translateY(-2px); box-shadow:0 15px 30px rgba(37,99,235,0.5); background:linear-gradient(135deg, #2563eb, #1d4ed8); }
        .auth-btn:active { transform:translateY(2px); box-shadow:0 5px 15px rgba(37,99,235,0.3); }
        .auth-btn:disabled { opacity:0.6; cursor:not-allowed; }
        .footer-links { display:flex; justify-content:center; margin-top:1.8rem; font-size:0.9rem; color:rgba(255,255,255,0.8); }
        .footer-links a { color:white; text-decoration:none; font-weight:500; transition:all 0.2s; border-bottom:1px solid transparent; }
        .footer-links a:hover { color:#bfdbfe; border-bottom-color:#bfdbfe; }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:white; color:#1f2937; padding:1rem 2rem; border-radius:2rem; box-shadow:0 10px 25px rgba(0,0,0,0.2); display:flex; align-items:center; gap:0.8rem; font-weight:500; z-index:1000; border-left:5px solid #3b82f6; animation:toastIn 0.5s ease, toastOut 0.5s ease 2.5s forwards; pointer-events:none; }
        .toast.error { border-left-color:#ef4444; }
        .toast.success { border-left-color:#10b981; }
        @keyframes toastIn { from { opacity:0; transform:translate(-50%, -20px); } to { opacity:1; transform:translate(-50%, 0); } }
        @keyframes toastOut { from { opacity:1; transform:translate(-50%, 0); } to { opacity:0; transform:translate(-50%, -20px); } }
        .hidden { display:none; }
        @media (max-width:480px) { .auth-card { padding:2rem 1.5rem; } .logo h1 { font-size:2rem; } }
    </style>
<script src="api.js"></script>
</head>
<body>
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="sun-ray"></div>

    <div id="toast" class="toast hidden">
        <i class="fas fa-cloud-sun-rain"></i>
        <span id="toast-message"></span>
    </div>

    <div class="auth-card">
        <div class="logo">
            <h1>Join GigShield</h1>
            <p>Start protecting your income</p>
        </div>

        <form id="signup-form" onsubmit="handleSignup(event)">
            <div class="input-group">
                <label for="fullname">Full Name</label>
                <i class="fas fa-user"></i>
                <input type="text" id="fullname" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label for="email">Email</label>
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="input-group">
                <label for="phone">Phone Number</label>
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" placeholder="9876543210" pattern="[0-9]{10}" required>
            </div>
            <div class="input-group">
                <label for="city">City</label>
                <i class="fas fa-city"></i>
                <select id="city" required>
                    <option value="" disabled selected>Select your city</option>
                    <option value="Mumbai">Mumbai</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Bangalore">Bangalore</option>
                    <option value="Hyderabad">Hyderabad</option>
                    <option value="Ahmedabad">Ahmedabad</option>
                    <option value="Chennai">Chennai</option>
                    <option value="Kolkata">Kolkata</option>
                    <option value="Pune">Pune</option>
                    <option value="Jaipur">Jaipur</option>
                    <option value="Lucknow">Lucknow</option>
                </select>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="input-group">
                <label for="confirm_password">Confirm Password</label>
                <i class="fas fa-lock"></i>
                <input type="password" id="confirm_password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn">Create Account</button>
        </form>

        <div class="footer-links">
            <a href="login.html">Already have an account? Log in</a>
        </div>
    </div>

    
<script>
async function handleSignup(e) {
    e.preventDefault();
    e.stopPropagation();

    var fullname = document.getElementById('fullname').value.trim();
    var phone    = document.getElementById('phone').value.trim();
    var city     = document.getElementById('city').value;
    var password = document.getElementById('password').value;
    var confirm  = document.getElementById('confirm_password').value;
    var btn      = document.querySelector('#signup-form .auth-btn');

    if (!fullname)              { alert('Enter your name'); return false; }
    if (!city)                  { alert('Select your city'); return false; }
    if (!/^[0-9]{10}$/.test(phone)) { alert('Phone must be 10 digits'); return false; }
    if (password !== confirm)   { alert('Passwords do not match'); return false; }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating...';

    try {
        var w = await apiPost('/workers/register', {
            name: fullname, phone: phone,
            platform: 'Zomato', city: city.toLowerCase(),
            avg_daily_earning: 500
        });
        localStorage.setItem('gs_worker', JSON.stringify({
            worker_id: w.worker_id, name: fullname, city: city
        }));
        try { await apiPost('/policies/create', {worker_id: w.worker_id, weeks: 1}); } catch(x){}
        alert('Account created! Worker ID: ' + w.worker_id + ' — Save this for login!');
        window.location.href = '/frontend/dashboard.html';
    } catch(err) {
        alert('Error: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = 'Create Account';
    }
    return false;
}

// raindrops
(function(){
    for(var i=0;i<50;i++){
        var d=document.createElement('div');
        d.className='raindrop';
        d.style.left=Math.random()*100+'%';
        d.style.animationDelay=Math.random()*2+'s';
        d.style.animationDuration=(2+Math.random()*2)+'s';
        d.style.opacity=Math.random()*0.5+0.2;
        document.body.appendChild(d);
    }
})();
</script>
</body>
</html>
