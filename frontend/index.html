<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GigShield AI — Income Protection for Gig Workers</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #0a0e1a;
    --surface:  #111827;
    --card:     #1a2235;
    --border:   #1f2d45;
    --accent:   #00e5ff;
    --accent2:  #7c3aed;
    --success:  #10b981;
    --warn:     #f59e0b;
    --danger:   #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --rain:     #38bdf8;
    --heat:     #fb923c;
    --aqi:      #a78bfa;
    --flood:    #34d399;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }

  /* ── NAV ── */
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px;
    background: rgba(10,14,26,0.95);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px; font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--text); }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 8px 18px; border-radius: 8px; border: none;
    background: transparent; color: var(--muted);
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
  }
  .nav-tab:hover { background: var(--card); color: var(--text); }
  .nav-tab.active { background: var(--accent); color: #000; font-weight: 700; }
  .worker-badge {
    font-size: 12px; background: var(--card);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 6px 14px; color: var(--muted);
    display: flex; align-items: center; gap: 6px;
  }
  .worker-badge.has-worker { border-color: var(--success); color: var(--success); }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* ── PAGES ── */
  .page { display: none; padding: 40px; max-width: 1100px; margin: 0 auto; }
  .page.active { display: block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── PAGE HEADER ── */
  .page-header { margin-bottom: 36px; }
  .page-header h2 { font-size: 32px; font-weight: 800; letter-spacing: -1px; }
  .page-header p { color: var(--muted); margin-top: 6px; font-size: 15px; }

  /* ── CARDS ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
  }
  .card-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--muted); margin-bottom: 20px;
  }

  /* ── FORMS ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group label { font-size: 13px; color: var(--muted); font-weight: 500; }
  .form-group input,
  .form-group select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface); }
  .full-width { grid-column: 1 / -1; }

  /* ── BUTTONS ── */
  .btn {
    padding: 13px 28px; border-radius: 10px; border: none;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s; display: inline-flex;
    align-items: center; gap: 8px;
  }
  .btn-primary {
    background: var(--accent); color: #000;
  }
  .btn-primary:hover { background: #00c4db; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--card); color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-success { background: var(--success); color: #000; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
  .btn-lg { padding: 16px 36px; font-size: 17px; width: 100%; justify-content: center; margin-top: 8px; }

  /* ── STAT CARDS ── */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px 24px;
  }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 8px; }
  .stat-value { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .stat-card.accent { border-color: var(--accent); }
  .stat-card.success { border-color: var(--success); }
  .stat-card.warn { border-color: var(--warn); }

  /* ── BADGE ── */
  .badge {
    display: inline-block; padding: 4px 12px;
    border-radius: 20px; font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .badge-success { background: rgba(16,185,129,0.15); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
  .badge-warn    { background: rgba(245,158,11,0.15); color: var(--warn);    border: 1px solid rgba(245,158,11,0.3); }
  .badge-danger  { background: rgba(239,68,68,0.15);  color: var(--danger);  border: 1px solid rgba(239,68,68,0.3); }
  .badge-accent  { background: rgba(0,229,255,0.15);  color: var(--accent);  border: 1px solid rgba(0,229,255,0.3); }
  .badge-purple  { background: rgba(124,58,237,0.15); color: #a78bfa;        border: 1px solid rgba(124,58,237,0.3); }

  /* ── ALERT ── */
  .alert {
    padding: 16px 20px; border-radius: 12px;
    font-size: 14px; margin-top: 20px;
    display: none;
  }
  .alert.show { display: block; animation: fadeUp 0.25s ease; }
  .alert-success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--success); }
  .alert-error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: var(--danger); }
  .alert-info    { background: rgba(0,229,255,0.1);  border: 1px solid rgba(0,229,255,0.3);  color: var(--accent); }

  /* ── RESULT BOX ── */
  .result-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-top: 20px;
    display: none; font-size: 14px;
  }
  .result-box.show { display: block; animation: fadeUp 0.3s ease; }
  .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .result-row:last-child { border-bottom: none; }
  .result-key { color: var(--muted); }
  .result-val { font-weight: 600; font-family: 'Syne', sans-serif; }
  .result-val.accent { color: var(--accent); }
  .result-val.success { color: var(--success); }
  .result-val.warn { color: var(--warn); }
  .result-val.danger { color: var(--danger); }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { background: var(--surface); padding: 14px 16px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: 700; }
  td { padding: 14px 16px; border-top: 1px solid var(--border); }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* ── TRIGGER CARDS ── */
  .trigger-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
  .trigger-card {
    background: var(--card); border: 2px solid var(--border);
    border-radius: 14px; padding: 18px; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }
  .trigger-card:hover { transform: translateY(-3px); }
  .trigger-card.selected { border-color: var(--accent); background: rgba(0,229,255,0.05); }
  .trigger-icon { font-size: 28px; margin-bottom: 8px; }
  .trigger-name { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
  .trigger-threshold { font-size: 11px; color: var(--muted); }

  /* ── PAYOUT ANIMATION ── */
  .payout-flash {
    background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(0,229,255,0.1));
    border: 1px solid var(--success); border-radius: 16px; padding: 24px;
    text-align: center; margin-top: 20px; display: none;
  }
  .payout-flash.show { display: block; animation: pulse 0.5s ease; }
  @keyframes pulse {
    0%   { transform: scale(0.95); opacity: 0; }
    60%  { transform: scale(1.02); }
    100% { transform: scale(1); opacity: 1; }
  }
  .payout-amount { font-family: 'Syne', sans-serif; font-size: 48px; font-weight: 800; color: var(--success); }
  .payout-label { color: var(--muted); font-size: 14px; margin-top: 4px; }

  /* ── COVERAGE BANNER ── */
  .coverage-banner {
    background: linear-gradient(135deg, rgba(0,229,255,0.08), rgba(124,58,237,0.08));
    border: 1px solid var(--accent); border-radius: 16px;
    padding: 24px 28px; margin-bottom: 28px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .coverage-banner .label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .coverage-banner .value { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; }

  /* ── FORECAST BARS ── */
  .forecast-item { margin-bottom: 14px; }
  .forecast-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
  .forecast-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .forecast-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

  /* ── LOADING ── */
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── HERO (landing) ── */
  .hero {
    text-align: center; padding: 80px 40px 60px;
    position: relative; overflow: hidden;
  }
  .hero-glow {
    position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
    width: 600px; height: 400px;
    background: radial-gradient(ellipse, rgba(0,229,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 { font-size: 56px; font-weight: 800; letter-spacing: -2px; line-height: 1.1; margin-bottom: 20px; }
  .hero h1 span { color: var(--accent); }
  .hero p { font-size: 18px; color: var(--muted); max-width: 560px; margin: 0 auto 40px; line-height: 1.6; }
  .hero-btns { display: flex; gap: 14px; justify-content: center; }
  .disruption-chips { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 48px; }
  .chip {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 8px 16px; font-size: 13px;
    display: flex; align-items: center; gap: 6px;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .form-grid { grid-template-columns: 1fr; }
    .trigger-grid { grid-template-columns: repeat(3, 1fr); }
    nav { padding: 14px 20px; }
    .page { padding: 20px; }
    .hero h1 { font-size: 36px; }
  }

  /* ── DIVIDER ── */
  .divider { height: 1px; background: var(--border); margin: 28px 0; }
  .section-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 18px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  @media (max-width: 768px) { .two-col, .three-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo">Gig<span>Shield</span> <span style="color:var(--accent);font-size:13px;vertical-align:middle">AI</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('home')">Home</button>
    <button class="nav-tab" onclick="showPage('register')">Register</button>
    <button class="nav-tab" onclick="showPage('quote')">Get Quote</button>
    <button class="nav-tab" onclick="showPage('policy')">Policy</button>
    <button class="nav-tab" onclick="showPage('trigger')">⚡ Trigger</button>
    <button class="nav-tab" onclick="showPage('dashboard')">Dashboard</button>
    <button class="nav-tab" onclick="showPage('admin')">Admin</button>
  </div>
  <div class="worker-badge" id="workerBadge">
    <span class="dot"></span>
    <span id="bad
